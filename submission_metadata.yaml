# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Anthropic) throughout development: to explore the released
  candidate dataset's actual statistical distributions (title frequency,
  skill-duration patterns between ML-titled and non-ML-titled candidates,
  company tiers, honeypot-style profile inconsistencies) before any scoring
  logic was written, to help design and review the hybrid scoring function
  in rank.py and semantic.py, and to draft this documentation. No candidate
  data was sent to any external API as part of the ranking step itself —
  rank.py and semantic.py run entirely locally with zero network access,
  using Python with scikit-learn and numpy only (no LLMs, no embeddings
  API, no GPU). All scoring weights, thresholds, and the TF-IDF reference
  narrative were derived from reading the job description and inspecting
  actual dataset distributions — not invented arbitrarily.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid rule-based + TF-IDF semantic ranker. Six weighted fit axes (skills
  0.342, title 0.243, experience 0.135, company pedigree 0.108, location
  0.072, semantic similarity 0.10) combined multiplicatively with a
  behavioral-availability factor (recency, response rate, open-to-work,
  interview completion). Skills scoring uses a proficiency x duration "trust"
  curve plus career-history corroboration to discount keyword-stuffed skill
  claims. Semantic signal uses TF-IDF over candidate free text (summary +
  career history + skill names) vs. a JD reference narrative — catching
  candidates who demonstrate fit without using exact keywords. Hard
  disqualifiers floor consulting-only, pure-academic, and off-domain
  profiles near zero. Implausibility check soft-penalizes honeypot-style
  profiles. Runtime ~37 seconds and ~3GB peak memory for the full 100K
  pool on a single CPU core, no network, no GPU.

